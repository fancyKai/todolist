<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 图图的任务清单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .nav-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .nav-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .task-list {
            list-style: none;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .task-item.completed {
            background: #d4edda;
            opacity: 0.7;
        }
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #888;
        }
        .checkbox {
            width: 28px;
            height: 28px;
            border: 3px solid #667eea;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .task-item.completed .checkbox {
            background: #28a745;
            border-color: #28a745;
        }
        .checkbox::after {
            content: '✓';
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .task-item.completed .checkbox::after {
            display: block;
        }
        .task-text {
            font-size: 18px;
            color: #333;
            flex-grow: 1;
        }
        .progress {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .progress-bar {
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-text {
            text-align: center;
            color: #888;
            font-size: 16px;
        }
        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }
        .day-card {
            padding: 10px 5px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .day-card:hover {
            background: #e9ecef;
        }
        .day-card.today {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .day-card .day-name {
            font-size: 12px;
            margin-bottom: 5px;
        }
        .day-card .day-date {
            font-size: 18px;
            font-weight: bold;
        }
        .day-card .day-status {
            font-size: 10px;
            margin-top: 5px;
        }
        .history-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .history-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .history-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .history-date {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .history-stats {
            display: flex;
            gap: 15px;
            font-size: 14px;
            color: #888;
        }
        .history-stats .completed {
            color: #28a745;
        }
        .back-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f00;
            animation: fall 3s linear forwards;
            pointer-events: none;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px 20px;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .edit-container {
            margin-top: 20px;
        }
        .edit-day-selector {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .edit-day-btn {
            padding: 8px 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            transition: all 0.3s;
        }
        .edit-day-btn.active {
            background: #667eea;
            color: white;
        }
        .edit-task-list {
            list-style: none;
        }
        .edit-task-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .edit-task-item input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            margin-right: 10px;
        }
        .edit-task-item .delete-btn {
            padding: 8px 12px;
            border: none;
            background: #dc3545;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .add-task-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .add-task-container input {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
        }
        .add-task-container button {
            padding: 12px 20px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .init-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }
        .init-success {
            text-align: center;
            padding: 20px;
            background: #d4edda;
            color: #155724;
            border-radius: 10px;
            margin-top: 20px;
        }
        .detail-task {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .detail-task:last-child {
            border-bottom: none;
        }
        .detail-task.done {
            color: #28a745;
        }
        .detail-task.not-done {
            color: #dc3545;
        }
        .detail-task::before {
            content: '';
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            display: inline-block;
        }
        .detail-task.done::before {
            background: #28a745;
        }
        .detail-task.not-done::before {
            border: 2px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 图图的任务清单</h1>
        <p class="subtitle" id="todayDisplay"></p>
        
        <!-- 导航标签 -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showPage('today')">今日</button>
            <button class="nav-tab" onclick="showPage('week')">本周</button>
            <button class="nav-tab" onclick="showPage('edit')">设置</button>
            <button class="nav-tab" onclick="showPage('history')">历史</button>
        </div>
        
        <!-- 今日任务页面 -->
        <div id="today-page" class="page active">
            <ul class="task-list" id="todayTaskList">
                <!-- 动态生成 -->
            </ul>
            
            <div class="progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">完成进度：0/0</p>
            </div>
        </div>
        
        <!-- 本周计划页面 -->
        <div id="week-page" class="page">
            <h3 style="margin-bottom: 15px; color: #333;">📅 本周计划</h3>
            <div class="week-grid" id="weekGrid">
                <!-- 动态生成 -->
            </div>
            <div id="weekDetail" style="display: none;">
                <h3 style="margin-bottom: 15px; color: #333;" id="weekDetailTitle"></h3>
                <ul class="task-list" id="weekTaskList">
                    <!-- 动态生成 -->
                </ul>
                <button class="back-btn" onclick="showWeekGrid()">← 返回周视图</button>
            </div>
        </div>
        
        <!-- 设置/编辑页面 -->
        <div id="edit-page" class="page">
            <h3 style="margin-bottom: 15px; color: #333;">⚙️ 任务设置</h3>
            
            <div id="initSection">
                <p style="color: #888; margin-bottom: 15px;">首次使用，请先初始化任务清单</p>
                <button class="init-btn" onclick="initDefaultTasks()">✅ 一键初始化</button>
            </div>
            
            <div id="editSection" style="display: none;">
                <div class="edit-day-selector" id="editDaySelector">
                    <!-- 动态生成 -->
                </div>
                
                <h4 id="editDayTitle" style="margin-bottom: 15px; color: #333;"></h4>
                
                <ul class="edit-task-list" id="editTaskList">
                    <!-- 动态生成 -->
                </ul>
                
                <div class="add-task-container">
                    <input type="text" id="newTaskInput" placeholder="输入新任务..." onkeypress="if(event.enterKey) addTask()">
                    <button onclick="addTask()">➕ 添加</button>
                </div>
                
                <div class="init-success" id="saveSuccess" style="display: none;">
                    ✅ 已保存
                </div>
            </div>
        </div>
        
        <!-- 历史记录页面 -->
        <div id="history-page" class="page">
            <h3 style="margin-bottom: 15px; color: #333;">📅 历史完成记录</h3>
            <ul class="history-list" id="historyList">
                <!-- 历史记录动态生成 -->
            </ul>
            <div id="historyDetail" style="display: none;">
                <div style="padding: 15px; background: #f8f9fa; border-radius: 10px;">
                    <h3 id="detailDate" style="margin-bottom: 10px; color: #333;"></h3>
                    <div id="detailTasks"></div>
                </div>
                <button class="back-btn" onclick="showHistoryList()">← 返回列表</button>
            </div>
        </div>
    </div>

    <script>
        const WEEKDAYS = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
        const WEEKDAYS_CN = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        const WEEKDAYS_SHORT = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

        // 默认任务配置
        const DEFAULT_TASKS = {
            monday: ['🧩 都都思维', '📺 英语动画片', '🥔 土豆逗两集', '📚 看中文书', '✍️ 写字课作业', '🎹 钢琴练习'],
            tuesday: ['🧸 小熊 app', '📺 英语动画片', '📖 三国演义一集', '🔤 学习拼音', '✍️ 写字课作业', '🎹 钢琴练习'],
            wednesday: ['🧩 都都思维', '📺 英语动画片', '🥔 土豆逗两集', '💻 英语线上课', '✍️ 写字课作业', '🎹 钢琴练习'],
            thursday: ['🧸 小熊 app', '📺 英语动画片', '📖 三国演义一集', '🔤 学习拼音', '✍️ 写字课作业', '🎹 钢琴练习'],
            friday: ['🧩 都都思维', '🧸 小熊 app', '📺 英语动画片', '🥔 土豆逗两集', '💻 英语线上课', '📚 看中文书'],
            saturday: ['✍️ 写字课', '🥊 散打课', '🧸 小熊 app', '🎬 纪录片一集', '📚 看中文书', '🔤 学习拼音', '🎹 钢琴练习', '📖 学而思能力书'],
            sunday: ['🎹 钢琴课', '🧩 都都思维', '🧸 小熊 app', '📺 英语动画片', '📝 钢琴书面作业', '📚 看中文书', '💻 英语线上课', '⚽ 户外/运动', '🎬 纪录片一集']
        };

        let currentEditDay = 'monday';

        // 获取今天星期几
        function getTodayWeekday() {
            const today = new Date();
            return WEEKDAYS[today.getDay()];
        }

        // 获取今天显示文本
        function getTodayDisplay() {
            const today = new Date();
            return WEEKDAYS_CN[today.getDay()];
        }

        // 获取存储的数据
        function getStorage() {
            const data = localStorage.getItem('tudouData');
            return data ? JSON.parse(data) : { tasks: {}, history: {} };
        }

        // 保存数据
        function saveStorage(data) {
            localStorage.setItem('tudouData', JSON.stringify(data));
        }

        // 获取某天的任务
        function getTasks(weekday) {
            const storage = getStorage();
            if (!storage.tasks[weekday]) {
                storage.tasks[weekday] = [];
                saveStorage(storage);
            }
            return storage.tasks[weekday];
        }

        // 保存某天的任务
        function saveTasks(weekday, tasks) {
            const storage = getStorage();
            storage.tasks[weekday] = tasks;
            saveStorage(storage);
        }

        // 获取某天的完成状态
        function getDayState(weekday) {
            const storage = getStorage();
            if (!storage.history[weekday]) {
                storage.history[weekday] = [];
                saveStorage(storage);
            }
            return storage.history[weekday];
        }

        // 保存某天的完成状态
        function saveDayState(weekday, state) {
            const storage = getStorage();
            storage.history[weekday] = state;
            saveStorage(storage);
        }

        // 初始化默认任务
        function initDefaultTasks() {
            const storage = {
                tasks: JSON.parse(JSON.stringify(DEFAULT_TASKS)),
                history: {}
            };
            saveStorage(storage);
            
            document.getElementById('initSection').style.display = 'none';
            document.getElementById('editSection').style.display = 'block';
            showEditDaySelector();
            
            // 显示成功提示
            const successDiv = document.getElementById('saveSuccess');
            successDiv.textContent = '🎉 初始化成功！';
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
                successDiv.textContent = '✅ 已保存';
            }, 3000);
        }

        // 初始化今日任务
        function initTodayTasks() {
            const weekday = getTodayWeekday();
            const tasks = getTasks(weekday);
            const state = getDayState(weekday);
            
            const taskList = document.getElementById('todayTaskList');
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>今天还没有任务哦～</p><p style="margin-top: 10px;">去"设置"里添加任务吧！</p></div>';
                document.getElementById('progressText').textContent = '完成进度：0/0';
                document.getElementById('progressFill').style.width = '0%';
                return;
            }
            
            tasks.forEach((task, index) => {
                const completed = state[index] || false;
                const li = document.createElement('li');
                li.className = `task-item${completed ? ' completed' : ''}`;
                li.onclick = () => toggleTodayTask(index, li);
                li.innerHTML = `
                    <div class="checkbox"></div>
                    <span class="task-text">${task}</span>
                `;
                taskList.appendChild(li);
            });
            
            updateProgress(tasks.length, state.filter(s => s).length);
        }

        // 切换今日任务状态
        function toggleTodayTask(index, element) {
            const weekday = getTodayWeekday();
            const state = getDayState(weekday);
            state[index] = !state[index];
            saveDayState(weekday, state);
            element.classList.toggle('completed');
            
            const tasks = getTasks(weekday);
            updateProgress(tasks.length, state.filter(s => s).length);
            
            if (state[index]) {
                createConfetti();
            }
        }

        // 更新进度
        function updateProgress(total, completed) {
            const percentage = total > 0 ? (completed / total) * 100 : 0;
            
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `完成进度：${completed}/${total}`;
            
            if (completed === total && total > 0) {
                document.getElementById('progressText').textContent = '🎉 太棒了！全部完成！';
            }
        }

        // 切换页面
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            
            if (page === 'today') {
                document.getElementById('today-page').classList.add('active');
                document.querySelectorAll('.nav-tab')[0].classList.add('active');
                initTodayTasks();
            } else if (page === 'week') {
                document.getElementById('week-page').classList.add('active');
                document.querySelectorAll('.nav-tab')[1].classList.add('active');
                showWeekGrid();
            } else if (page === 'edit') {
                document.getElementById('edit-page').classList.add('active');
                document.querySelectorAll('.nav-tab')[2].classList.add('active');
                showEditPage();
            } else {
                document.getElementById('history-page').classList.add('active');
                document.querySelectorAll('.nav-tab')[3].classList.add('active');
                showHistoryList();
            }
        }

        // 显示设置页面
        function showEditPage() {
            const storage = getStorage();
            const hasData = storage.tasks && Object.keys(storage.tasks).length > 0;
            
            if (hasData && storage.tasks.monday && storage.tasks.monday.length > 0) {
                document.getElementById('initSection').style.display = 'none';
                document.getElementById('editSection').style.display = 'block';
                showEditDaySelector();
            } else {
                document.getElementById('initSection').style.display = 'block';
                document.getElementById('editSection').style.display = 'none';
            }
        }

        // 显示编辑日期选择器
        function showEditDaySelector() {
            const selector = document.getElementById('editDaySelector');
            selector.innerHTML = '';
            
            WEEKDAYS.forEach((day, index) => {
                const btn = document.createElement('button');
                btn.className = `edit-day-btn${day === currentEditDay ? ' active' : ''}`;
                btn.textContent = WEEKDAYS_SHORT[index];
                btn.onclick = () => selectEditDay(day, index);
                selector.appendChild(btn);
            });
            
            showEditTasks();
        }

        // 选择编辑日期
        function selectEditDay(day, index) {
            currentEditDay = day;
            document.querySelectorAll('.edit-day-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            showEditTasks();
        }

        // 显示编辑任务列表
        function showEditTasks() {
            const tasks = getTasks(currentEditDay);
            const taskList = document.getElementById('editTaskList');
            const title = document.getElementById('editDayTitle');
            
            const dayIndex = WEEKDAYS.indexOf(currentEditDay);
            title.textContent = `${WEEKDAYS_CN[dayIndex]} - ${tasks.length} 项任务`;
            
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>还没有任务，添加一个吧！</p></div>';
                return;
            }
            
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'edit-task-item';
                li.innerHTML = `
                    <input type="text" value="${task}" onchange="updateTask(${index}, this.value)">
                    <button class="delete-btn" onclick="deleteTask(${index})">删除</button>
                `;
                taskList.appendChild(li);
            });
        }

        // 更新任务
        function updateTask(index, value) {
            const tasks = getTasks(currentEditDay);
            tasks[index] = value;
            saveTasks(currentEditDay, tasks);
            showSaveSuccess();
        }

        // 添加任务
        function addTask() {
            const input = document.getElementById('newTaskInput');
            const value = input.value.trim();
            
            if (!value) return;
            
            const tasks = getTasks(currentEditDay);
            tasks.push(value);
            saveTasks(currentEditDay, tasks);
            
            input.value = '';
            showEditTasks();
            showSaveSuccess();
        }

        // 删除任务
        function deleteTask(index) {
            const tasks = getTasks(currentEditDay);
            tasks.splice(index, 1);
            saveTasks(currentEditDay, tasks);
            showEditTasks();
            showSaveSuccess();
        }

        // 显示保存成功
        function showSaveSuccess() {
            const successDiv = document.getElementById('saveSuccess');
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 2000);
        }

        // 显示周视图
        function showWeekGrid() {
            document.getElementById('weekDetail').style.display = 'none';
            const grid = document.getElementById('weekGrid');
            grid.innerHTML = '';
            
            const todayIndex = new Date().getDay();
            
            for (let i = 0; i < 7; i++) {
                const weekday = WEEKDAYS[i];
                const tasks = getTasks(weekday);
                const state = getDayState(weekday);
                const completed = state.filter(s => s).length;
                const isToday = i === todayIndex;
                
                const card = document.createElement('div');
                card.className = `day-card${isToday ? ' today' : ''}`;
                card.onclick = () => showDayDetail(weekday, i);
                card.innerHTML = `
                    <div class="day-name">${WEEKDAYS_SHORT[i]}</div>
                    <div class="day-date">${tasks.length > 0 ? '📋' : '○'}</div>
                    <div class="day-status">${completed}/${tasks.length}</div>
                `;
                grid.appendChild(card);
            }
        }

        // 显示某天详情
        function showDayDetail(weekday, dayIndex) {
            document.getElementById('weekGrid').style.display = 'none';
            document.getElementById('weekDetail').style.display = 'block';
            
            const tasks = getTasks(weekday);
            const state = getDayState(weekday);
            const taskList = document.getElementById('weekTaskList');
            taskList.innerHTML = '';
            
            document.getElementById('weekDetailTitle').textContent = WEEKDAYS_CN[dayIndex];
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>这天还没有任务哦～</p></div>';
                return;
            }
            
            tasks.forEach((task, index) => {
                const completed = state[index] || false;
                const li = document.createElement('li');
                li.className = `task-item${completed ? ' completed' : ''}`;
                li.onclick = () => toggleWeekTask(weekday, index, li);
                li.innerHTML = `
                    <div class="checkbox"></div>
                    <span class="task-text">${task}</span>
                `;
                taskList.appendChild(li);
            });
        }

        // 切换周视图任务
        function toggleWeekTask(weekday, index, element) {
            const state = getDayState(weekday);
            state[index] = !state[index];
            saveDayState(weekday, state);
            element.classList.toggle('completed');
            showWeekGrid();
            
            if (state[index]) {
                createConfetti();
            }
        }

        // 返回周视图
        function showWeekGrid() {
            document.getElementById('weekDetail').style.display = 'none';
            document.getElementById('weekGrid').style.display = 'grid';
        }

        // 显示历史列表
        function showHistoryList() {
            document.getElementById('historyDetail').style.display = 'none';
            const storage = getStorage();
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            const dates = Object.keys(storage.history).filter(d => d !== 'tasks').sort().reverse();
            
            if (dates.length === 0) {
                historyList.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无历史记录</p></div>';
                return;
            }
            
            dates.forEach(date => {
                const state = storage.history[date];
                const tasks = getTasks(date);
                const completed = state.filter(s => s).length;
                const total = tasks.length;
                const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
                
                const li = document.createElement('li');
                li.className = 'history-item';
                li.onclick = () => showHistoryDetail(date);
                li.innerHTML = `
                    <div class="history-date">${WEEKDAYS_CN[WEEKDAYS.indexOf(date)] || date}</div>
                    <div class="history-stats">
                        <span class="completed">✓ 完成 ${completed}/${total}</span>
                        <span>完成率 ${percent}%</span>
                    </div>
                `;
                historyList.appendChild(li);
            });
        }

        // 显示历史详情
        function showHistoryDetail(date) {
            document.getElementById('historyList').style.display = 'none';
            document.getElementById('historyDetail').style.display = 'block';
            
            const storage = getStorage();
            const state = storage.history[date];
            const tasks = getTasks(date);
            
            document.getElementById('detailDate').textContent = WEEKDAYS_CN[WEEKDAYS.indexOf(date)] || date;
            const tasksDiv = document.getElementById('detailTasks');
            tasksDiv.innerHTML = '';
            
            if (tasks.length === 0) {
                tasksDiv.innerHTML = '<div class="empty-state"><p>暂无任务</p></div>';
                return;
            }
            
            state.forEach((done, index) => {
                const task = tasks[index] || '未知任务';
                const div = document.createElement('div');
                div.className = `detail-task ${done ? 'done' : 'not-done'}`;
                div.textContent = `${done ? '✓' : '✗'} ${task}`;
                tasksDiv.appendChild(div);
            });
        }

        // 返回列表
        function showHistoryList() {
            document.getElementById('historyDetail').style.display = 'none';
            document.getElementById('historyList').style.display = 'block';
        }

        // 放烟花
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff', '#f0f'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }

        // 初始化
        document.getElementById('todayDisplay').textContent = getTodayDisplay();
        initTodayTasks();
    </script>
</body>
</html>
