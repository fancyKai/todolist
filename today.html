<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 今日计划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .date {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .nav-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .task-list {
            list-style: none;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .task-item.completed {
            background: #d4edda;
            opacity: 0.7;
        }
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #888;
        }
        .checkbox {
            width: 28px;
            height: 28px;
            border: 3px solid #667eea;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .task-item.completed .checkbox {
            background: #28a745;
            border-color: #28a745;
        }
        .checkbox::after {
            content: '✓';
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .task-item.completed .checkbox::after {
            display: block;
        }
        .task-text {
            font-size: 18px;
            color: #333;
            flex-grow: 1;
        }
        .progress {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .progress-bar {
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-text {
            text-align: center;
            color: #888;
            font-size: 16px;
        }
        .history-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .history-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .history-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .history-date {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .history-stats {
            display: flex;
            gap: 15px;
            font-size: 14px;
            color: #888;
        }
        .history-stats .completed {
            color: #28a745;
        }
        .history-detail {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .history-detail h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .detail-task {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .detail-task:last-child {
            border-bottom: none;
        }
        .detail-task.done {
            color: #28a745;
        }
        .detail-task.not-done {
            color: #dc3545;
        }
        .detail-task::before {
            content: '';
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            display: inline-block;
        }
        .detail-task.done::before {
            background: #28a745;
        }
        .detail-task.not-done::before {
            border: 2px solid #dc3545;
        }
        .back-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f00;
            animation: fall 3s linear forwards;
            pointer-events: none;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 今日计划</h1>
        <p class="date">2026 年 03 月 15 日 星期日</p>
        
        <!-- 导航标签 -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showPage('today')">今日任务</button>
            <button class="nav-tab" onclick="showPage('history')">历史记录</button>
        </div>
        
        <!-- 今日任务页面 -->
        <div id="today-page" class="page active">
            <ul class="task-list">
                <li class="task-item" onclick="toggleTask(this)">
                    <div class="checkbox"></div>
                    <span class="task-text">🧩 都都思维</span>
                </li>
                <li class="task-item" onclick="toggleTask(this)">
                    <div class="checkbox"></div>
                    <span class="task-text">📺 动画片</span>
                </li>
                <li class="task-item" onclick="toggleTask(this)">
                    <div class="checkbox"></div>
                    <span class="task-text">📚 看中文书</span>
                </li>
                <li class="task-item" onclick="toggleTask(this)">
                    <div class="checkbox"></div>
                    <span class="task-text">🎹 钢琴练习</span>
                </li>
                <li class="task-item" onclick="toggleTask(this)">
                    <div class="checkbox"></div>
                    <span class="task-text">✍️ 写字课作业</span>
                </li>
                <li class="task-item" onclick="toggleTask(this)">
                    <div class="checkbox"></div>
                    <span class="task-text">🎮 思维游戏</span>
                </li>
            </ul>
            
            <div class="progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">完成进度：0/6</p>
            </div>
        </div>
        
        <!-- 历史记录页面 -->
        <div id="history-page" class="page">
            <h3 style="margin-bottom: 15px; color: #333;">📅 历史完成记录</h3>
            <ul class="history-list" id="historyList">
                <!-- 历史记录动态生成 -->
            </ul>
            <div id="historyDetail" style="display: none;">
                <div class="history-detail">
                    <h3 id="detailDate"></h3>
                    <div id="detailTasks"></div>
                </div>
                <button class="back-btn" onclick="showHistoryList()">← 返回列表</button>
            </div>
        </div>
    </div>

    <script>
        const TASKS = [
            '🧩 都都思维',
            '📺 动画片',
            '📚 看中文书',
            '🎹 钢琴练习',
            '✍️ 写字课作业',
            '🎮 思维游戏'
        ];
        const TODAY = '2026-03-15';

        // 获取存储的数据
        function getStorage() {
            const data = localStorage.getItem('todolistData');
            return data ? JSON.parse(data) : { days: {} };
        }

        // 保存数据
        function saveStorage(data) {
            localStorage.setItem('todolistData', JSON.stringify(data));
        }

        // 获取今日任务状态
        function getTodayState() {
            const storage = getStorage();
            if (!storage.days[TODAY]) {
                storage.days[TODAY] = Array(TASKS.length).fill(false);
                saveStorage(storage);
            }
            return storage.days[TODAY];
        }

        // 保存今日任务状态
        function saveTodayState(state) {
            const storage = getStorage();
            storage.days[TODAY] = state;
            saveStorage(storage);
        }

        // 初始化今日任务
        function initTodayTasks() {
            const state = getTodayState();
            const items = document.querySelectorAll('.task-item');
            items.forEach((item, index) => {
                if (state[index]) {
                    item.classList.add('completed');
                }
            });
            updateProgress();
        }

        // 切换任务状态
        function toggleTask(element) {
            element.classList.toggle('completed');
            const items = document.querySelectorAll('.task-item');
            const state = Array.from(items).map(item => item.classList.contains('completed'));
            saveTodayState(state);
            updateProgress();
            
            if (element.classList.contains('completed')) {
                createConfetti();
            }
        }

        // 更新进度
        function updateProgress() {
            const items = document.querySelectorAll('.task-item');
            const completed = document.querySelectorAll('.task-item.completed').length;
            const total = items.length;
            const percentage = (completed / total) * 100;
            
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `完成进度：${completed}/${total}`;
            
            if (completed === total && total > 0) {
                document.getElementById('progressText').textContent = '🎉 太棒了！全部完成！';
            }
        }

        // 切换页面
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            
            if (page === 'today') {
                document.getElementById('today-page').classList.add('active');
                document.querySelectorAll('.nav-tab')[0].classList.add('active');
            } else {
                document.getElementById('history-page').classList.add('active');
                document.querySelectorAll('.nav-tab')[1].classList.add('active');
                showHistoryList();
            }
        }

        // 显示历史列表
        function showHistoryList() {
            document.getElementById('historyDetail').style.display = 'none';
            const storage = getStorage();
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            const dates = Object.keys(storage.days).sort().reverse();
            
            if (dates.length === 0) {
                historyList.innerHTML = '<li style="text-align: center; color: #888; padding: 20px;">暂无历史记录</li>';
                return;
            }
            
            dates.forEach(date => {
                const state = storage.days[date];
                const completed = state.filter(s => s).length;
                const total = state.length;
                const percent = Math.round((completed / total) * 100);
                
                const li = document.createElement('li');
                li.className = 'history-item';
                li.onclick = () => showHistoryDetail(date);
                li.innerHTML = `
                    <div class="history-date">${formatDate(date)}</div>
                    <div class="history-stats">
                        <span class="completed">✓ 完成 ${completed}/${total}</span>
                        <span>完成率 ${percent}%</span>
                    </div>
                `;
                historyList.appendChild(li);
            });
        }

        // 显示历史详情
        function showHistoryDetail(date) {
            document.getElementById('historyList').style.display = 'none';
            document.getElementById('historyDetail').style.display = 'block';
            
            const storage = getStorage();
            const state = storage.days[date];
            
            document.getElementById('detailDate').textContent = formatDate(date);
            const tasksDiv = document.getElementById('detailTasks');
            tasksDiv.innerHTML = '';
            
            state.forEach((done, index) => {
                const div = document.createElement('div');
                div.className = `detail-task ${done ? 'done' : 'not-done'}`;
                div.textContent = `${done ? '✓' : '✗'} ${TASKS[index]}`;
                tasksDiv.appendChild(div);
            });
        }

        // 返回列表
        function showHistoryList() {
            document.getElementById('historyDetail').style.display = 'none';
            document.getElementById('historyList').style.display = 'block';
        }

        // 格式化日期
        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const weekday = weekdays[date.getDay()];
            return `${year}年${month}月${day}日 ${weekday}`;
        }

        // 放烟花
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff', '#f0f'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }

        // 初始化
        initTodayTasks();
    </script>
</body>
</html>
