<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 明日计划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .date {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .task-list {
            list-style: none;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .task-item.completed {
            background: #d4edda;
            opacity: 0.7;
        }
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #888;
        }
        .checkbox {
            width: 28px;
            height: 28px;
            border: 3px solid #667eea;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .task-item.completed .checkbox {
            background: #28a745;
            border-color: #28a745;
        }
        .checkbox::after {
            content: '✓';
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .task-item.completed .checkbox::after {
            display: block;
        }
        .task-text {
            font-size: 18px;
            color: #333;
            flex-grow: 1;
        }
        .progress {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .progress-bar {
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-text {
            text-align: center;
            color: #888;
            font-size: 16px;
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f00;
            animation: fall 3s linear forwards;
            pointer-events: none;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 今日计划</h1>
        <p class="date">2026 年 03 月 15 日 星期日</p>
        
        <ul class="task-list">
            <li class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span class="task-text">🧩 都都思维</span>
            </li>
            <li class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span class="task-text">📺 动画片</span>
            </li>
            <li class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span class="task-text">📚 看中文书</span>
            </li>
            <li class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span class="task-text">🎹 钢琴练习</span>
            </li>
            <li class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span class="task-text">✍️ 写字课作业</span>
            </li>
            <li class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span class="task-text">🎮 思维游戏</span>
            </li>
        </ul>
        
        <div class="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">完成进度：0/5</p>
        </div>
    </div>

    <script>
        // 加载保存的状态
        function loadState() {
            const saved = localStorage.getItem('taskState');
            if (saved) {
                const state = JSON.parse(saved);
                const items = document.querySelectorAll('.task-item');
                items.forEach((item, index) => {
                    if (state[index]) {
                        item.classList.add('completed');
                    }
                });
                updateProgress();
            }
        }

        // 保存状态
        function saveState() {
            const items = document.querySelectorAll('.task-item');
            const state = Array.from(items).map(item => item.classList.contains('completed'));
            localStorage.setItem('taskState', JSON.stringify(state));
        }

        // 切换任务状态
        function toggleTask(element) {
            element.classList.toggle('completed');
            saveState();
            updateProgress();
            
            // 如果完成，放烟花
            if (element.classList.contains('completed')) {
                createConfetti();
            }
        }

        // 更新进度
        function updateProgress() {
            const items = document.querySelectorAll('.task-item');
            const completed = document.querySelectorAll('.task-item.completed').length;
            const total = items.length;
            const percentage = (completed / total) * 100;
            
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `完成进度：${completed}/${total}`;
            
            // 全部完成
            if (completed === total && total > 0) {
                document.getElementById('progressText').textContent = '🎉 太棒了！全部完成！';
            }
            
            // 全部完成
            if (completed === total && total > 0) {
                document.getElementById('progressText').textContent = '🎉 太棒了！全部完成！';
            }
        }

        // 放烟花效果
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff', '#f0f'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }

        // 初始化
        loadState();
    </script>
</body>
</html>
